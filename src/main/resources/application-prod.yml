spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

jwt:
  token:
    secretKey: ${JWT_SECRET_KEY}
    expiration:
      access: 1800000       # 30분 (ms)
      refresh: 1209600000   # 14일 (ms)

hmac:
  secret-key: ${HMAC_SECRET_KEY}
