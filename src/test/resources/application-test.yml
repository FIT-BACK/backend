spring:
  datasource:
    url: jdbc:h2:mem:fitback_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret: test-jwt-secret-key-for-test-codes
  access-token-expiration: 1800000       # 30분 (ms)
  refresh-token-expiration: 1209600000   # 14일 (ms)