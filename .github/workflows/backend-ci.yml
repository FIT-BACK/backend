name: Backend CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build and test backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Verify Backend CD output contract
        shell: bash
        run: |
          expression_prefix='$'
          required_output_mappings=(
            "      image-uri: ${expression_prefix}{{ steps.push-image.outputs.image-uri }}"
            "      image-digest: ${expression_prefix}{{ steps.resolve-digest.outputs.image-digest }}"
            "      image-reference: ${expression_prefix}{{ steps.resolve-digest.outputs.image-reference }}"
          )

          for required_mapping in "${required_output_mappings[@]}"; do
            if ! grep --quiet --fixed-strings --line-regexp "$required_mapping" \
                .github/workflows/backend-cd.yml; then
              echo "Backend CD job output mapping is missing or invalid: ${required_mapping}" >&2
              exit 1
            fi
          done

          if grep --quiet --extended-regexp '^[[:space:]]+mask-aws-account-id:[[:space:]]+true$' \
              .github/workflows/backend-cd.yml \
            && grep --quiet --extended-regexp '^[[:space:]]+image-(uri|reference):' \
              .github/workflows/backend-cd.yml; then
            echo 'Backend CD cannot mask the AWS account ID while exporting ECR URI job outputs.' >&2
            exit 1
          fi

      - name: Build backend
        run: ./gradlew clean build

      - name: Upload test reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-test-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            build/reports/tests/test/**
            build/test-results/test/**
          if-no-files-found: warn
          retention-days: 7

  ci-gate:
    name: CI Gate
    if: ${{ always() }}
    needs:
      - verify
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify required jobs
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: |
          if [ "$VERIFY_RESULT" != "success" ]; then
            echo "Required job failed: verify=$VERIFY_RESULT"
            exit 1
          fi

          echo "All required jobs passed."
