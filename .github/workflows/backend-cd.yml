name: Backend CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-image-publish-production
  cancel-in-progress: false

jobs:
  publish-image:
    name: Build, verify, and publish image
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    outputs:
      image-uri: ${{ steps.push-image.outputs.image-uri }}
      image-digest: ${{ steps.resolve-digest.outputs.image-digest }}
      image-reference: ${{ steps.resolve-digest.outputs.image-reference }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      IMAGE_TAG: git-${{ github.sha }}
      LOCAL_IMAGE: fitback-backend:git-${{ github.sha }}
      VALIDATION_CONTAINER: fitback-backend-validation-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Validate required repository variables
        shell: bash
        run: |
          required_variables=(AWS_REGION AWS_DEPLOY_ROLE_ARN ECR_REPOSITORY)

          for variable_name in "${required_variables[@]}"; do
            if [ -z "${!variable_name}" ]; then
              echo "Required GitHub repository variable is missing: ${variable_name}" >&2
              exit 1
            fi
          done

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build backend image
        run: |
          docker build --check .
          docker build \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --tag "$LOCAL_IMAGE" \
            .

      - name: Start image validation container
        run: |
          docker run --detach \
            --name "$VALIDATION_CONTAINER" \
            --publish 127.0.0.1:18080:8080 \
            --read-only \
            --tmpfs /tmp:size=64m,mode=1777 \
            --security-opt no-new-privileges:true \
            --env SPRING_PROFILES_ACTIVE=prod \
            --env 'DB_URL=jdbc:h2:mem:fitback_cd;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1' \
            --env DB_USER=sa \
            --env DB_PASSWORD=validation \
            --env SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver \
            --env SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop \
            "$LOCAL_IMAGE"

      - name: Verify image readiness and metadata
        shell: bash
        run: |
          readiness_response=''

          for attempt in {1..30}; do
            readiness_response="$(curl --fail --silent --show-error \
              http://127.0.0.1:18080/actuator/health/readiness 2>/dev/null || true)"

            if echo "$readiness_response" | grep --quiet '"status":"UP"'; then
              break
            fi

            sleep 2
          done

          if ! echo "$readiness_response" | grep --quiet '"status":"UP"'; then
            docker logs "$VALIDATION_CONTAINER"
            echo "Backend image did not become ready within 60 seconds." >&2
            exit 1
          fi

          configured_user="$(docker image inspect \
            --format '{{.Config.User}}' "$LOCAL_IMAGE")"
          runtime_uid="$(docker exec "$VALIDATION_CONTAINER" id -u)"
          image_revision="$(docker image inspect \
            --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' \
            "$LOCAL_IMAGE")"

          if [ "$configured_user" != 'fitback' ]; then
            echo "Unexpected configured user: $configured_user" >&2
            exit 1
          fi

          if [ "$runtime_uid" != '10001' ]; then
            echo "Unexpected runtime UID: $runtime_uid" >&2
            exit 1
          fi

          if [ "$image_revision" != "$GITHUB_SHA" ]; then
            echo "Unexpected image revision: $image_revision" >&2
            exit 1
          fi

          echo "readiness=$readiness_response"
          echo "configured_user=$configured_user"
          echo "runtime_uid=$runtime_uid"
          echo "image_revision=$image_revision"

      - name: Remove image validation container
        if: ${{ always() }}
        run: docker rm --force "$VALIDATION_CONTAINER" 2>/dev/null || true

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: fitback-ecr-${{ github.run_id }}
          mask-aws-account-id: true

      - name: Verify AWS identity and ECR repository
        run: |
          aws sts get-caller-identity
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            > /dev/null

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        with:
          mask-password: true

      - name: Push image to Amazon ECR
        id: push-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          docker tag "$LOCAL_IMAGE" "$image_uri"
          docker push "$image_uri"

          echo "image-uri=$image_uri" >> "$GITHUB_OUTPUT"

      - name: Resolve immutable ECR image digest
        id: resolve-digest
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI: ${{ steps.push-image.outputs.image-uri }}
        shell: bash
        run: |
          image_digest=''

          for attempt in {1..10}; do
            image_digest="$(aws ecr describe-images \
              --repository-name "$ECR_REPOSITORY" \
              --image-ids imageTag="$IMAGE_TAG" \
              --query 'imageDetails[0].imageDigest' \
              --output text 2>/dev/null || true)"

            if [[ "$image_digest" == sha256:* ]]; then
              break
            fi

            sleep 2
          done

          if [[ "$image_digest" != sha256:* ]]; then
            echo "Failed to resolve the ECR image digest for $IMAGE_URI" >&2
            exit 1
          fi

          image_reference="${ECR_REGISTRY}/${ECR_REPOSITORY}@${image_digest}"

          echo "image-digest=$image_digest" >> "$GITHUB_OUTPUT"
          echo "image-reference=$image_reference" >> "$GITHUB_OUTPUT"

      - name: Write image publication summary
        env:
          IMAGE_URI: ${{ steps.push-image.outputs.image-uri }}
          IMAGE_DIGEST: ${{ steps.resolve-digest.outputs.image-digest }}
          IMAGE_REFERENCE: ${{ steps.resolve-digest.outputs.image-reference }}
        run: |
          {
            echo '## Backend image published'
            echo
            echo "- Git SHA: \`$GITHUB_SHA\`"
            echo "- Image tag: \`$IMAGE_URI\`"
            echo "- Image digest: \`$IMAGE_DIGEST\`"
            echo "- Deploy reference: \`$IMAGE_REFERENCE\`"
          } >> "$GITHUB_STEP_SUMMARY"
