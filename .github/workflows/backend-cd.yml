name: Backend CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-image-publish-production
  cancel-in-progress: false

jobs:
  publish-image:
    name: Build, verify, and publish image
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    outputs:
      image-uri: ${{ steps.push-image.outputs.image-uri }}
      image-digest: ${{ steps.resolve-digest.outputs.image-digest }}
      image-reference: ${{ steps.resolve-digest.outputs.image-reference }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      IMAGE_TAG: git-${{ github.sha }}
      LOCAL_IMAGE: fitback-backend:git-${{ github.sha }}
      VALIDATION_CONTAINER: fitback-backend-validation-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Validate required repository variables
        shell: bash
        run: |
          required_variables=(AWS_REGION AWS_DEPLOY_ROLE_ARN ECR_REPOSITORY)

          for variable_name in "${required_variables[@]}"; do
            if [ -z "${!variable_name}" ]; then
              echo "Required GitHub repository variable is missing: ${variable_name}" >&2
              exit 1
            fi
          done

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build backend image
        run: |
          docker build --check .
          docker build \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --tag "$LOCAL_IMAGE" \
            .

      - name: Start image validation container
        run: |
          docker run --detach \
            --name "$VALIDATION_CONTAINER" \
            --publish 127.0.0.1:18080:8080 \
            --read-only \
            --tmpfs /tmp:size=64m,mode=1777 \
            --security-opt no-new-privileges:true \
            --env SPRING_PROFILES_ACTIVE=prod \
            --env 'DB_URL=jdbc:h2:mem:fitback_cd;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1' \
            --env DB_USER=sa \
            --env DB_PASSWORD=validation \
            --env JWT_SECRET_KEY=fitback-cd-validation-secret-key-32bytes \
            --env SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver \
            --env SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop \
            "$LOCAL_IMAGE"

      - name: Verify image readiness and metadata
        shell: bash
        run: |
          readiness_response=''

          for attempt in {1..30}; do
            readiness_response="$(curl --fail --silent --show-error --max-time 5 \
              http://127.0.0.1:18080/actuator/health/readiness 2>/dev/null || true)"

            if echo "$readiness_response" | grep --quiet '"status":"UP"'; then
              break
            fi

            sleep 2
          done

          if ! echo "$readiness_response" | grep --quiet '"status":"UP"'; then
            docker logs "$VALIDATION_CONTAINER"
            echo "Backend image did not become ready after 30 attempts." >&2
            exit 1
          fi

          configured_user="$(docker image inspect \
            --format '{{.Config.User}}' "$LOCAL_IMAGE")"
          runtime_uid="$(docker exec "$VALIDATION_CONTAINER" id -u)"
          image_revision="$(docker image inspect \
            --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' \
            "$LOCAL_IMAGE")"

          if [ "$configured_user" != 'fitback' ]; then
            echo "Unexpected configured user: $configured_user" >&2
            exit 1
          fi

          if [ "$runtime_uid" != '10001' ]; then
            echo "Unexpected runtime UID: $runtime_uid" >&2
            exit 1
          fi

          if [ "$image_revision" != "$GITHUB_SHA" ]; then
            echo "Unexpected image revision: $image_revision" >&2
            exit 1
          fi

          echo "readiness=$readiness_response"
          echo "configured_user=$configured_user"
          echo "runtime_uid=$runtime_uid"
          echo "image_revision=$image_revision"

      - name: Remove image validation container
        if: ${{ always() }}
        run: docker rm --force "$VALIDATION_CONTAINER" 2>/dev/null || true

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: fitback-ecr-${{ github.run_id }}
          mask-aws-account-id: false

      - name: Verify AWS identity and ECR repository
        run: |
          aws sts get-caller-identity
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            > /dev/null

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        with:
          mask-password: true

      - name: Push image to Amazon ECR
        id: push-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: bash scripts/ci/publish_ecr_image.sh

      - name: Resolve immutable ECR image digest
        id: resolve-digest
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI: ${{ steps.push-image.outputs.image-uri }}
        shell: bash
        run: |
          image_digest=''

          for attempt in {1..10}; do
            image_digest="$(aws ecr describe-images \
              --repository-name "$ECR_REPOSITORY" \
              --image-ids imageTag="$IMAGE_TAG" \
              --query 'imageDetails[0].imageDigest' \
              --output text 2>/dev/null || true)"

            if [[ "$image_digest" == sha256:* ]]; then
              break
            fi

            sleep 2
          done

          if [[ "$image_digest" != sha256:* ]]; then
            echo "Failed to resolve the ECR image digest for $IMAGE_URI" >&2
            exit 1
          fi

          image_reference="${ECR_REGISTRY}/${ECR_REPOSITORY}@${image_digest}"

          echo "image-digest=$image_digest" >> "$GITHUB_OUTPUT"
          echo "image-reference=$image_reference" >> "$GITHUB_OUTPUT"

      - name: Write image publication summary
        env:
          IMAGE_URI: ${{ steps.push-image.outputs.image-uri }}
          IMAGE_DIGEST: ${{ steps.resolve-digest.outputs.image-digest }}
          IMAGE_REFERENCE: ${{ steps.resolve-digest.outputs.image-reference }}
        run: |
          {
            echo '## Backend image published'
            echo
            echo "- Git SHA: \`$GITHUB_SHA\`"
            echo "- Image tag: \`$IMAGE_URI\`"
            echo "- Image digest: \`$IMAGE_DIGEST\`"
            echo "- Deploy reference: \`$IMAGE_REFERENCE\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy production via SSM
    needs: publish-image
    if: ${{ needs.publish-image.result == 'success' && vars.EC2_INSTANCE_ID != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      PARAMETER_PREFIX: ${{ vars.DEPLOY_PARAMETER_PREFIX || '/fitback/prod' }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
      IMAGE_REFERENCE: ${{ needs.publish-image.outputs.image-reference }}

    steps:
      - name: Validate deployment contract
        shell: bash
        run: |
          required_variables=(AWS_REGION AWS_DEPLOY_ROLE_ARN EC2_INSTANCE_ID IMAGE_REFERENCE PUBLIC_BASE_URL)

          for variable_name in "${required_variables[@]}"; do
            if [ -z "${!variable_name}" ]; then
              echo "Required deployment value is missing: ${variable_name}" >&2
              exit 1
            fi
          done

          if [[ ! "$IMAGE_REFERENCE" =~ @sha256:[0-9a-f]{64}$ ]]; then
            echo "Deployment requires a digest-pinned image: $IMAGE_REFERENCE" >&2
            exit 1
          fi

          if [[ ! "$PARAMETER_PREFIX" =~ ^/[A-Za-z0-9_.\/-]+$ ]]; then
            echo "Invalid Parameter Store prefix: $PARAMETER_PREFIX" >&2
            exit 1
          fi

          if [ "$PUBLIC_BASE_URL" != 'https://d1ra74et9h0ohu.cloudfront.net' ]; then
            echo "PUBLIC_BASE_URL must be the production CloudFront HTTPS origin without a path: $PUBLIC_BASE_URL" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: fitback-ssm-${{ github.run_id }}
          mask-aws-account-id: false

      - name: Verify the SSM managed node
        shell: bash
        run: |
          ping_status="$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$EC2_INSTANCE_ID" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text)"

          if [ "$ping_status" != 'Online' ]; then
            echo "EC2 instance is not an online SSM managed node: $EC2_INSTANCE_ID" >&2
            exit 1
          fi

      - name: Build the SSM deployment payload
        shell: bash
        run: |
          release_name="${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          release_dir="/opt/fitback/releases/${release_name}"
          bundle="$(tar -czf - \
            compose.yaml \
            deploy/nginx/default.conf \
            scripts/deploy/remote_deploy.sh | base64 | tr -d '\n')"

          jq --null-input \
            --arg bundle "$bundle" \
            --arg image_reference "$IMAGE_REFERENCE" \
            --arg aws_region "$AWS_REGION" \
            --arg parameter_prefix "$PARAMETER_PREFIX" \
            --arg release_dir "$release_dir" \
            '{
              executionTimeout: ["900"],
              commands: [
                "set -euo pipefail",
                ("install -d -m 0755 " + ($release_dir | @sh)),
                ("printf %s " + ($bundle | @sh) + " | base64 -d | tar -xzf - -C " + ($release_dir | @sh)),
                ("chmod 0755 " + (($release_dir + "/scripts/deploy/remote_deploy.sh") | @sh)),
                ("IMAGE_REFERENCE=" + ($image_reference | @sh)
                  + " AWS_REGION=" + ($aws_region | @sh)
                  + " PARAMETER_PREFIX=" + ($parameter_prefix | @sh)
                  + " DEPLOY_ROOT=/opt/fitback"
                  + " RELEASE_DIR=" + ($release_dir | @sh)
                  + " " + (($release_dir + "/scripts/deploy/remote_deploy.sh") | @sh))
              ]
            }' > /tmp/ssm-commands.json

          payload_bytes="$(wc -c < /tmp/ssm-commands.json)"
          if [ "$payload_bytes" -gt 24000 ]; then
            echo "SSM command payload is too large: ${payload_bytes} bytes" >&2
            exit 1
          fi

          echo "SSM command payload: ${payload_bytes} bytes"

      - name: Send deployment command
        id: send-command
        shell: bash
        run: |
          command_id="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "FIT-BACK deploy $GITHUB_SHA" \
            --timeout-seconds 60 \
            --parameters file:///tmp/ssm-commands.json \
            --query 'Command.CommandId' \
            --output text)"

          if [ -z "$command_id" ] || [ "$command_id" = 'None' ]; then
            echo 'AWS Systems Manager did not return a command ID.' >&2
            exit 1
          fi

          echo "command-id=$command_id" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment result
        env:
          COMMAND_ID: ${{ steps.send-command.outputs.command-id }}
        shell: bash
        run: |
          command_result=''
          command_terminal=0
          cancellation_requested=0

          cancel_pending_command() {
            if [ "$command_terminal" -eq 0 ] && [ "$cancellation_requested" -eq 0 ]; then
              echo "Cancelling SSM deployment command: $COMMAND_ID" >&2
              if aws ssm cancel-command \
                  --command-id "$COMMAND_ID" \
                  --instance-ids "$EC2_INSTANCE_ID" > /dev/null; then
                cancellation_requested=1
              else
                echo "Failed to request cancellation for SSM command: $COMMAND_ID" >&2
                return 1
              fi
            fi
          }

          wait_for_terminal_after_cancellation() {
            for cancel_attempt in {1..12}; do
              command_result="$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --output json 2>/dev/null || true)"
              command_status="$(jq --raw-output '.Status // empty' <<< "$command_result")"

              case "$command_status" in
                Success|Failed|Cancelled|TimedOut|Undeliverable|Terminated)
                  command_terminal=1
                  break
                  ;;
              esac

              sleep 5
            done

            jq --raw-output '.StandardOutputContent // empty' <<< "$command_result" >&2
            jq --raw-output '.StandardErrorContent // empty' <<< "$command_result" >&2
            if [ "$command_terminal" -eq 1 ]; then
              echo "SSM command reached terminal status after cancellation: ${command_status:-unknown}" >&2
            else
              echo "SSM command cancellation was not confirmed; last status: ${command_status:-unknown}" >&2
            fi
          }

          handle_interruption() {
            trap - EXIT INT TERM
            cancel_pending_command || true
            wait_for_terminal_after_cancellation
            exit 130
          }

          trap 'cancel_pending_command || true' EXIT
          trap handle_interruption INT TERM

          for attempt in {1..205}; do
            command_result="$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --output json 2>/dev/null || true)"
            command_status="$(jq --raw-output '.Status // empty' <<< "$command_result")"

            case "$command_status" in
              Success)
                command_terminal=1
                jq --raw-output '.StandardOutputContent' <<< "$command_result"
                break
                ;;
              Failed|Cancelled|TimedOut|Undeliverable|Terminated)
                command_terminal=1
                jq --raw-output '.StandardOutputContent' <<< "$command_result" >&2
                jq --raw-output '.StandardErrorContent' <<< "$command_result" >&2
                echo "SSM deployment failed with status: $command_status" >&2
                exit 1
                ;;
            esac

            if [ "$attempt" -eq 205 ]; then
              echo 'Timed out waiting for the SSM deployment command.' >&2
              cancel_pending_command || true
              wait_for_terminal_after_cancellation
              exit 1
            fi

            sleep 5
          done

          trap - EXIT INT TERM

          {
            echo '## Backend deployed through SSM'
            echo
            echo "- Instance: \`$EC2_INSTANCE_ID\`"
            echo "- Image: \`$IMAGE_REFERENCE\`"
            echo "- Command: \`$COMMAND_ID\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify public HTTPS endpoint
        continue-on-error: true
        shell: bash
        run: |
          report_public_failure() {
            echo "::warning::Public HTTPS verification failed after the SSM deployment. The verified EC2 release remains active. Check CloudFront and origin health, then rerun the same main SHA with workflow_dispatch after recovery."
            {
              echo
              echo '### Public HTTPS verification warning'
              echo
              echo '- The SSM deployment succeeded, but the public CloudFront check failed.'
              echo '- Check CloudFront and origin health, then rerun the same main SHA with `workflow_dispatch` after recovery.'
            } >> "$GITHUB_STEP_SUMMARY"
          }

          public_base_url="$PUBLIC_BASE_URL"
          if ! nginx_health="$(curl --fail --silent --show-error --max-time 10 \
            "$public_base_url/nginx-health")"; then
            report_public_failure
            exit 1
          fi

          if ! readiness="$(curl --fail --silent --show-error --max-time 10 \
            "$public_base_url/actuator/health/readiness")"; then
            report_public_failure
            exit 1
          fi

          if [ "$nginx_health" != 'ok' ]; then
            echo "Unexpected public Nginx health response: $nginx_health" >&2
            report_public_failure
            exit 1
          fi

          if ! jq --exit-status 'type == "object" and .status == "UP"' \
              <<< "$readiness" > /dev/null; then
            echo "Unexpected public readiness response: $readiness" >&2
            report_public_failure
            exit 1
          fi

          {
            echo
            echo "- Public endpoint: \`$public_base_url\`"
            echo "- Public Nginx health: \`$nginx_health\`"
            echo "- Public readiness: \`$readiness\`"
          } >> "$GITHUB_STEP_SUMMARY"
