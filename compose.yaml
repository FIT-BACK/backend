name: fitback-backend

services:
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    init: true
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL:?DB_URL is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-com.mysql.cj.jdbc.Driver}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
    expose:
      - "8080"
    networks:
      - application
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - --show-error
        - http://127.0.0.1:8080/actuator/health/readiness
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

  nginx:
    image: nginxinc/nginx-unprivileged:1.28.0-alpine@sha256:c97ff0bf7cbae369953c6da1232ec14ad9f971d66360c5698db0856a4cd657a0
    restart: unless-stopped
    init: true
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_BIND_ADDRESS:-0.0.0.0}:${HTTP_PORT:-80}:8080"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge
      - application
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --output-document=-
        - http://127.0.0.1:8080/nginx-health
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m,mode=0755
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s

networks:
  edge:
  application:
